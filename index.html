<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<link rel="stylesheet" href="css/main.css">
		<link rel="stylesheet" href="css/toasts.css" defer>
		<script src="js/main.js"></script>
		<script src="js/toasts.js" defer></script>
		<script src="https://www.youtube.com/player_api" defer></script>
	</head>
	<body>
		<div id="menu">
			<h1>Welcome to the BlindTest</h1>
			<div>Currently listed videos: <span id="vid_count">0</span> (remaining to be loaded: <span id="load_count">0</span>)</div>

			<br/>
			<div>Some videos may be unavailable due to Country restrictions or Youtube policies (some video are not allowed to be played outside youtube.com). They will be removed while loading.</div>
			<br/>
			<button onclick="loadFromFile()">Load more from File</button><br/>
			<button onclick="loadFromInput()">Load more from Json</button><br/>
			<button onclick="resetList()">Reset list</button><br/>
			<br/>
			<button onclick="onStart()">Start</button>
		</div>

		<!-- Header div, showing song name -->
		<div id="banner">Loading...</div>

		<!-- Center div -->
		<div id="main">
			<div>
				<!-- Youtube video player -->
				<div id="player" style="z-index: 0; position: absolute; margin-left: auto; margin-right: auto;"></div>

				<!-- Curatain to hide playing video -->
				<div id="curtain">
					<p id="counter"></p>
				</div>
			</div>
		</div>

		<!-- Footer div -->
		<div style="height: 4em;">
			<button id="skipBtn" onclick="clickNext()">Next</button>
			<button id="playBtn" onclick="clickPlayPause()">Play/Pause</button>
		</div>
	</body>
</html>
