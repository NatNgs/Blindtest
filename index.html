<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<link rel="icon" type="image/x-icon" href="favicon.svg">

		<link rel="stylesheet" href="css/main.css">
		<link rel="stylesheet" href="css/toasts.css" defer>
		<script src="js/main.js"></script>
		<script src="js/list.js"></script>
		<script src="js/toasts.js" defer></script>
		<script src="https://www.youtube.com/player_api" defer></script>
	</head>
	<body>
		<!-- Header div, showing song name -->
		<div id="banner"><span id="played_count">0</span> / <span id="vid_count">0</span></div>

		<!-- Center div -->
		<div id="main">
			<div>
				<!-- Youtube video player -->
				<div id="player" style="z-index: 0; position: absolute; margin-left: auto; margin-right: auto;"></div>

				<!-- Curatain to hide playing video -->
				<div id="curtain">&nbsp;</div>
				<p id="counter">&nbsp;</p>
			</div>
		</div>

		<!-- Footer div -->
		<div style="height: 4em;">
			<button id="skipBtn" onclick="clickStart()">START !</button>
			<button id="playBtn" onclick="clickPlayPause()">Play/Pause</button>
		</div>

		<div id="loadStats">
			<div>
				<button onclick="loadFromList()">Load more from file</button><br/>
				<button onclick="loadFromPopup()">Add by url</button>
			</div>
			&nbsp;
			<div>
				<button onclick="saveToFile()">Export full list</button><br/>
				<button onclick="saveToFile(true)">Export remaining</button>
			</div>
		</div>
	</body>
</html>
