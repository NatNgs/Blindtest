<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 12 104 104" stroke="#CA3" fill="#CA3">

	<g stroke-linecap="round" stroke-linejoin="round">
		<!-- Eye Outline (Pointy Almond Shape) -->
		<path d="M20 64 C35 45, 55 40, 64 40 C73 40, 93 45, 108 64 C93 83, 73 88, 64 88 C55 88, 35 83, 20 64 Z"
				fill="white" stroke-width="5" stroke-linecap="round"/>

		<!-- The Music Note (Centered Head + Right-Aligned Stem/Flag) -->

		<!-- The Note Head (Pupil) - Centered at 64,64 -->
		<ellipse cx="58" cy="62" rx="12" ry="14" transform="rotate(-15 64 64)"/>
		<!-- Note stem -->
		<g fill="none">
			<path d="M65 68 L72 25" stroke-width="9"/>
			<path d="M63 25 Q89 25 110 35" stroke-width="12"/>
		</g>

		<!-- Eyelashes (Further Outside the Almond Eye) -->
		<!-- Top Lashes - Moved further up/out -->
		<g stroke-width="3">
			<line x1="25" y1="50" x2="18" y2="44"/>
			<line x1="35" y1="43" x2="30" y2="36"/>
			<line x1="45" y1="38" x2="41" y2="31"/>
			<line x1="55" y1="35" x2="53" y2="27"/>
		</g>
	</g>
</svg>
