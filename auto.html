<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<link rel="stylesheet" href="css/main.css">
		<link rel="stylesheet" href="css/toasts.css" defer>
		<script src="js/main.js"></script>
		<script src="js/list.js"></script>
		<script src="js/toasts.js" defer></script>
		<script src="https://www.youtube.com/player_api" defer></script>
	</head>
	<body>
		<div id="menu">
			<h1>Welcome to NindTest</h1>

			<br/>
			<button onclick="loadFromList()">Load more</button><br/>
			<button onclick="resetList()">Reset list</button><br/>
			<button onclick="saveToFile()">Export loaded list</button><br/>
			<br/>
			<button onclick="onStart()">Start</button>
		</div>

		<!-- Header div, showing song name -->
		<div id="banner">Loading...</div>

		<!-- Center div -->
		<div id="main">
			<div>
				<!-- Youtube video player -->
				<div id="loader" style="z-index: -999; position: fixed; left: -100%; top: -100%; opacity: 0;"></div>
				<div id="player" style="z-index: 0; position: absolute; margin-left: auto; margin-right: auto;"></div>

				<!-- Curatain to hide playing video -->
				<div id="curtain">
					<p id="counter"></p>
				</div>
			</div>
		</div>

		<!-- Footer div -->
		<div style="height: 4em;">
			<button id="skipBtn" onclick="clickNext()">Next</button>
			<button id="playBtn" onclick="clickPlayPause()">Play/Pause</button>
		</div>

		<div id="loadStats">Listed: <span id="vid_count">0</span> (Loading: <span id="load_count">0</span>)</div>
	</body>
</html>
